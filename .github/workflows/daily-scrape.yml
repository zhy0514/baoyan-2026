name: Daily Scrape

on:
  schedule:
    # 北京时间每天早上7点 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler/requirements.txt

      - name: Run scrapers
        working-directory: crawler
        run: python main.py

      - name: Commit and push changes
        run: |
          git config user.name "baoyan-scraper-bot"
          git config user.email "bot@baoyan-aggregator.example.com"
          git add data/
          git diff --cached --quiet || (git commit -m "data: daily scrape $(date -u +'%Y-%m-%d')" && git push)
