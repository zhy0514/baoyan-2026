<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 番茄钟</title>
<style>
  :root {
    --work: #e74c3c;
    --short-break: #2ecc71;
    --long-break: #3498db;
    --bg: #1a1a2e;
    --card: #16213e;
    --text: #eee;
    --sub: #aaa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .container {
    text-align: center;
    padding: 2rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    color: var(--sub);
  }

  /* ---- mode tabs ---- */
  .modes {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    background: var(--card);
    border-radius: 999px;
    overflow: hidden;
    padding: 4px;
  }

  .mode-btn {
    flex: 1;
    padding: 0.6rem 1.5rem;
    border: none;
    background: transparent;
    color: var(--sub);
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-weight: 600;
  }

  /* ---- ring ---- */
  .ring-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 0 auto 2rem;
  }

  svg {
    transform: rotate(-90deg);
    width: 300px;
    height: 300px;
  }

  .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 8;
  }

  .ring-fg {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.5s;
  }

  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-size: 5rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
  }

  .label {
    font-size: 0.9rem;
    color: var(--sub);
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
  }

  /* ---- controls ---- */
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    background: var(--card);
    color: #fff;
    transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
  }
  .btn:active { transform: scale(0.95); }

  .btn-start {
    background: var(--work);
    width: 64px;
    height: 64px;
    font-size: 1.8rem;
  }
  .btn-start.paused { background: var(--short-break); }

  /* ---- session counter ---- */
  .sessions {
    font-size: 0.9rem;
    color: var(--sub);
  }
  .sessions span { color: #fff; font-weight: 600; }

  /* ---- toast ---- */
  .toast {
    position: fixed;
    top: 2rem;
    left: 50%;
    translate: -50% 0;
    background: var(--card);
    padding: 1rem 2rem;
    border-radius: 999px;
    font-size: 0.95rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>🍅 番茄钟</h1>

  <div class="modes">
    <button class="mode-btn active" data-mode="work">专注 25</button>
    <button class="mode-btn" data-mode="short">小休 5</button>
    <button class="mode-btn" data-mode="long">长休 15</button>
  </div>

  <div class="ring-wrapper">
    <svg viewBox="0 0 120 120">
      <circle class="ring-bg" cx="60" cy="60" r="54"/>
      <circle class="ring-fg" id="ring" cx="60" cy="60" r="54"
              stroke="var(--work)"
              stroke-dasharray="339.292"
              stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="time" id="time">25:00</div>
      <div class="label" id="label">专注</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btnReset" title="重置">↺</button>
    <button class="btn btn-start" id="btnStart" title="开始">▶</button>
    <button class="btn" id="btnSkip" title="跳过">⏭</button>
  </div>

  <div class="sessions">
    已完成 <span id="count">0</span> 个番茄
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 54; // ~339.292

const MODES = {
  work:    { minutes: 25, label: '专注', color: 'var(--work)'       },
  short:   { minutes:  5, label: '小休', color: 'var(--short-break)' },
  long:    { minutes: 15, label: '长休', color: 'var(--long-break)'  },
};

// ---- state ----
let mode        = 'work';
let totalSec    = MODES[mode].minutes * 60;
let remaining   = totalSec;
let running     = false;
let intervalId  = null;
let sessionCount = 0;

// ---- DOM ----
const $time    = document.getElementById('time');
const $label   = document.getElementById('label');
const $ring    = document.getElementById('ring');
const $btnStart= document.getElementById('btnStart');
const $btnReset= document.getElementById('btnReset');
const $btnSkip = document.getElementById('btnSkip');
const $count   = document.getElementById('count');
const $toast   = document.getElementById('toast');
const $modes   = document.querySelectorAll('.mode-btn');

// ---- audio context (lazy) ----
let audioCtx = null;
function beep(freq, dur = 0.15) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playAlarm() {
  beep(784, 0.15); setTimeout(() => beep(988, 0.15), 200);
  setTimeout(() => beep(1175, 0.3), 400);
}

// ---- helpers ----
function mmss(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function updateDisplay() {
  $time.textContent = mmss(remaining);
  const fraction = 1 - remaining / totalSec;
  $ring.style.strokeDashoffset = CIRCUMFERENCE * fraction;
  document.title = `${mmss(remaining)} — 🍅 番茄钟`;
}

function updateModeUI() {
  const cfg = MODES[mode];
  $ring.style.stroke = cfg.color;
  $label.textContent = cfg.label;
  $modes.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  if (!running) {
    $btnStart.textContent = '▶';
    $btnStart.classList.remove('paused');
  }
}

function setMode(m) {
  mode = m;
  const cfg = MODES[mode];
  totalSec  = cfg.minutes * 60;
  remaining = totalSec;
  updateModeUI();
  updateDisplay();
}

// ---- timer ----
function tick() {
  if (remaining <= 0) return;
  remaining--;
  updateDisplay();
  if (remaining === 0) {
    stop();
    playAlarm();
    if (mode === 'work') {
      sessionCount++;
      $count.textContent = sessionCount;
    }
    toast(mode === 'work' ? '🍅 时间到！休息一下吧～' : '☕ 休息结束，继续加油！');
  }
}

function start() {
  if (running) return;
  if (remaining <= 0) resetCurrent();
  running = true;
  intervalId = setInterval(tick, 1000);
  $btnStart.textContent = '⏸';
  $btnStart.classList.add('paused');
}

function stop() {
  running = false;
  clearInterval(intervalId);
  intervalId = null;
  $btnStart.textContent = '▶';
  $btnStart.classList.remove('paused');
}

function resetCurrent() {
  stop();
  remaining = MODES[mode].minutes * 60;
  totalSec = remaining;
  updateDisplay();
}

function skip() {
  stop();
  remaining = 0;
  updateDisplay();
  playAlarm();
  if (mode === 'work') {
    sessionCount++;
    $count.textContent = sessionCount;
  }
  toast('已跳过');
}

// ---- toast ----
let toastTimer;
function toast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), 2200);
}

// ---- events ----
$btnStart.addEventListener('click', () => {
  if (running) stop(); else start();
});

$btnReset.addEventListener('click', resetCurrent);
$btnSkip.addEventListener('click', skip);

$modes.forEach(b => {
  b.addEventListener('click', () => setMode(b.dataset.mode));
});

// ---- keyboard ----
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    running ? stop() : start();
  }
  if (e.code === 'KeyR') resetCurrent();
  if (e.code === 'KeyS') skip();
  if (e.code === 'Digit1') setMode('work');
  if (e.code === 'Digit2') setMode('short');
  if (e.code === 'Digit3') setMode('long');
});

// ---- init ----
updateDisplay();
</script>
</body>
</html>
